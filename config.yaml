# ─────────────────────────────────────────────────────────────────────────────
# TAP India CSR Research Agent — Configuration
# ─────────────────────────────────────────────────────────────────────────────

# ── Scoring weights (must sum to 100) ────────────────────────────────────────
weights:
  focus_alignment:  55    # How closely CSR focus matches TAP's exact mission (education-first)
  adjacency_boost:  15    # Adjacent/related programs that create partnership opportunity
  geography_fit:    10    # India presence and relevant states
  csr_maturity:     10    # How structured/mature is their CSR programme
  budget_size:      5     # India CSR spend (unknown → neutral, not 0)
  source_quality:   5     # Quality of sources where evidence was found

# ── TAP's exact focus areas (for Focus Alignment scoring) ────────────────────
# TAP = 21st-century skills & mindsets (critical thinking, creativity,
# confidence, communication, problem-solving, self-awareness, financial
# literacy) for low-income MIDDLE & HIGH SCHOOL students in India, delivered
# through TAP Buddy — an AI/NLP-powered WhatsApp chatbot with co-curricular
# electives (coding, science, visual arts, financial literacy) and
# self-learning projects. TAP develops skills & mindsets in school-age
# children — it does NOT run vocational training or job placement.
tap_focus_areas:
  "21st century skills":           100
  "21st-century skills":           100
  "project-based learning":        100
  "pbl":                            95
  "life skills":                    95
  "social emotional learning":      95
  "social-emotional learning":      95
  "socio-emotional":                90
  "critical thinking":              90
  "growth mindset":                 90
  "financial literacy":             90
  "self-learning":                  90
  "co-curricular":                  90
  "problem solving":                85
  "problem-solving":                85
  "holistic development":           85
  "student leadership":             85
  "creativity":                     80
  "coding":                         80
  "stem education":                 80
  "digital literacy":               80
  "visual arts":                    75
  "school education":               75
  "middle school":                  75
  "secondary school":               75
  "high school":                    70
  "edtech":                         70
  "skill development":              65
  "skilling":                       65
  "education":                      55
  "scholarship":                    40

# ── Adjacency clusters (THE CORE INTELLIGENCE) ───────────────────────────────
# Each cluster = a set of signals that indicate adjacent fit with TAP
# If a company shows evidence in a cluster → adjacency boost applies
# Multiple clusters can fire; total is capped at max_total_boost
adjacency_clusters:

  government_schools:
    label: "Government School Outreach"
    keywords:
      - "government school"
      - "govt school"
      - "public school"
      - "state school"
      - "municipal school"
      - "zila parishad school"
      - "kendriya vidyalaya"
      - "navodaya vidyalaya"
      - "sarva shiksha"
      - "samagra shiksha"
      - "pm shri"
    tap_reasoning: >
      TAP delivers through government school systems and works with bodies like
      MCD, DoE Delhi, SCERT Maharashtra, BMC and Pune Zilla Parishad. A company
      with existing government school outreach removes the biggest barrier to
      partnership — institutional access.
    boost: 20

  digital_education:
    label: "Digital / EdTech Delivery"
    keywords:
      - "digital learning"
      - "e-learning"
      - "edtech"
      - "online education"
      - "digital classroom"
      - "smart classroom"
      - "learning platform"
      - "digital education"
      - "learning app"
      - "chatbot"
      - "whatsapp learning"
      - "blended learning"
      - "digital skills"
    tap_reasoning: >
      TAP Buddy is an AI/NLP-powered WhatsApp chatbot. Companies funding
      digital and edtech-led learning already believe in TAP's delivery model
      and reach the same student population at low cost.
    boost: 15

  life_skills_sel:
    label: "Life Skills & Social-Emotional Learning"
    keywords:
      - "life skills"
      - "social emotional"
      - "social-emotional"
      - "socio-emotional"
      - "soft skills"
      - "confidence building"
      - "self-esteem"
      - "communication skills"
      - "leadership development"
      - "growth mindset"
      - "wellbeing"
      - "adolescent"
    tap_reasoning: >
      Life-skills and SEL programmes target exactly the skills TAP Buddy
      develops — creativity, confidence, communication, problem-solving and
      self-awareness — in the same middle/high-school age group.
    boost: 15

  financial_literacy:
    label: "Financial Literacy"
    keywords:
      - "financial literacy"
      - "financial education"
      - "financial inclusion"
      - "money management"
      - "banking literacy"
      - "financial awareness"
    tap_reasoning: >
      Financial literacy is one of TAP Buddy's core electives. Only 1 in 5
      Indian teenagers is financially literate — a company funding financial
      education is a direct fit for TAP's curriculum.
    boost: 12

  stem_exposure:
    label: "STEM & Coding"
    keywords:
      - "STEM"
      - "coding"
      - "robotics"
      - "science education"
      - "mathematics education"
      - "technology education"
      - "computational thinking"
      - "programming"
      - "maker"
      - "hackathon"
      - "innovation lab"
    tap_reasoning: >
      Coding and science are TAP Buddy electives, and TAP runs hackathons,
      exhibitions and school showcases. STEM funders align with TAP's
      21st-century skills curriculum.
    boost: 12

  learning_quality:
    label: "Learning Quality & Outcomes"
    keywords:
      - "learning outcomes"
      - "foundational literacy"
      - "foundational numeracy"
      - "learning quality"
      - "education quality"
      - "school improvement"
      - "remedial education"
      - "bridge course"
    tap_reasoning: >
      A focus on measurable learning outcomes aligns with TAP's evidence-based
      programme design and impact measurement approach.
    boost: 8

  teacher_training:
    label: "Teacher Development"
    keywords:
      - "teacher training"
      - "teacher development"
      - "educator training"
      - "teacher capacity"
      - "teaching quality"
      - "pedagogy"
    tap_reasoning: >
      TAP is student-facing (self-learning via TAP Buddy), so teacher-training
      funders are only moderately adjacent — they invest in the same schools
      but a different lever.
    boost: 6

  downstream_employability:
    label: "Downstream Employability (weak signal)"
    keywords:
      - "employability"
      - "job readiness"
      - "placement"
      - "vocational training"
      - "apprenticeship"
      - "workforce development"
      - "career guidance"
    tap_reasoning: >
      IMPORTANT NUANCE: TAP trains school students in 21st-century skills — it
      does NOT run vocational training or job placement. Employability funders
      sit downstream of TAP's work. Pitch TAP as the upstream feeder that
      builds the skills their employability programmes require — but treat
      this as a weak signal, not a match.
    boost: 6

  ngo_collaboration:
    label: "Active NGO Collaborations"
    keywords:
      - "implementing partner"
      - "implementation partner"
      - "ngo partner"
      - "partnered with"
      - "in collaboration with"
      - "joined hands with"
      - "mou with"
    tap_reasoning: >
      The company already funds and delivers CSR through NGO implementation
      partners — TAP fits an existing collaboration model, so onboarding
      friction and due-diligence barriers are low.
    boost: 8

# Cap on total adjacency boost (prevents unrealistic over-scoring)
max_adjacency_boost: 20

# ── Geography scoring ─────────────────────────────────────────────────────────
# TAP's government partners: MCD & DoE (Delhi), SCERT Maharashtra, BMC,
# Pune Zilla Parishad → Delhi + Maharashtra are TAP's presence states.
tap_states:
  - "maharashtra"
  - "delhi"

other_india_states:
  - "karnataka"
  - "telangana"
  - "andhra pradesh"
  - "tamil nadu"
  - "rajasthan"
  - "gujarat"
  - "uttar pradesh"
  - "west bengal"
  - "kerala"
  - "madhya pradesh"
  - "bihar"
  - "haryana"
  - "punjab"
  - "odisha"
  - "jharkhand"
  - "chhattisgarh"
  - "assam"

# Score bands for geography
geo_scores:
  tap_state_count_3plus: 10
  tap_state_count_1_2:    7
  other_india_only:        4
  india_mentioned_only:    2
  no_india:                0

# ── CSR Maturity signals ──────────────────────────────────────────────────────
# Each signal that is PRESENT adds its score
maturity_signals:
  "csr committee":          3
  "csr policy":             2
  "csr report":             2
  "schedule vii":           2
  "csr-2":                  2
  "impact assessment":      2
  "csr foundation":         3
  "ngo partner":            1
  "third party":            1
  "monitoring":             1
maturity_cap: 10   # total maturity score capped here

# ── India budget tiers (₹ crore) ─────────────────────────────────────────────
india_budget_tiers:
  - min_crore: 100
    score: 10
    label: "Major India CSR (₹100Cr+)"
  - min_crore: 50
    score: 9
    label: "Large (₹50–100Cr)"
  - min_crore: 10
    score: 7
    label: "Mid-large (₹10–50Cr)"
  - min_crore: 5
    score: 6
    label: "Mid (₹5–10Cr)"
  - min_crore: 1
    score: 5
    label: "Small-mid (₹1–5Cr)"
  - min_crore: 0
    score: 3
    label: "Under ₹1Cr"
budget_unknown_score: 5   # Neutral — not penalised for missing data

# ── Source quality scores ─────────────────────────────────────────────────────
source_quality:
  india_csr_page:       10
  mca_portal:            9   # direct MCA master-data fetch (verified)
  mca_via_search:        4   # MCA info via web-search snippets (PROXY, not verified)
  national_csr_portal:   9
  annual_report:         8   # parsed directly from the company's own PDF
  global_annual_report:  6
  partner_search:        5   # partner pages found via targeted search
  people_search:         4   # LinkedIn/search snippets (published by LinkedIn)
  web_search_snippet:    3

# ── Scoring gradient (strict) ─────────────────────────────────────────────────
# Not every company can be green. Only PRIORITY/STRONG go to the partnership
# team — that's what makes the pre-sales engine convert.
score_bands:
  - min: 90
    key: "PRIORITY"
    label: "Priority match — hand to partnership team now"
    color: "#7C3AED"
  - min: 80
    key: "STRONG"
    label: "Strong match — pursue actively with tailored pitch"
    color: "#16A34A"
  - min: 65
    key: "PROMISING"
    label: "Promising — nurture, strengthen the case before outreach"
    color: "#0EA5E9"
  - min: 45
    key: "WATCHLIST"
    label: "Watchlist — revisit quarterly"
    color: "#D97706"
  - min: 0
    key: "LOW"
    label: "Low fit — deprioritise"
    color: "#DC2626"

# ── CSR delivery model detection (funder vs implementer) ─────────────────────
# FUNDER = grants to external NGOs (ideal for TAP: they already fund orgs
# like us). IMPLEMENTER = runs CSR through its own foundation/teams (harder).
csr_delivery_model:
  funder_signals:
    - "implementation partner"
    - "implementing partner"
    - "implementing partners"
    - "implementation partners"
    - "implementing agency"
    - "ngo partner"
    - "ngo partners"
    - "partner ngo"
    - "partner ngos"
    - "in partnership with"
    - "partnered with"
    - "grant-making"
    - "csr grant"
    - "grants to"
    - "funding support to"
    - "supported ngos"
  implementer_signals:
    - "our foundation"
    - "flagship programme"
    - "flagship program"
    - "directly implement"
    - "directly implements"
    - "implemented by our"
    - "our teams on the ground"
    - "employee volunteering"
    - "our volunteers"
    - "in-house programme"
    - "in-house program"
    - "own foundation"

