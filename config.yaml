# ── Semantic alignment scoring (LLM) ─────────────────────────────────────────
# Reads org_mission + fetched CSR evidence and judges alignment by MEANING.
# Can only RAISE the focus-alignment dimension (never lower it).
# Requires GROQ_API_KEY in .env — silently disabled otherwise.
semantic_scoring:
  enabled: true
  provider: groq
  model: llama-3.3-70b-versatile

# The mission the LLM scores companies against. Forkers: replace with your
# own organisation's mission to reuse this tool.
org_mission: >
  The Apprentice Project (TAP) develops 21st-century skills (critical
  thinking, creativity, confidence, communication, problem-solving,
  self-awareness, financial literacy) for low-income middle and high school
  students in India, delivered through TAP Buddy — an AI-powered WhatsApp
  chatbot with video electives (Coding, Science, Visual Arts, Financial
  Literacy). TAP works exclusively in government schools with partners like
  MCD, DoE Delhi, BMC Mumbai and SCERT Maharashtra. TAP does NOT run
  vocational training or job placement.
